# Nom de l'application
spring.application.name=Visa

# Local development settings
server.port=8085

# PostgreSQL local
spring.datasource.url=jdbc:postgresql://localhost:5432/visa?autoCommit=false
spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.password=nella
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20

# Hibernate (local)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Configuration de validité du visa transformable
renouvellement.delta.jours=0

# Configuration upload de documents (Sprint 3)
upload.dir=E:/HP/Documents/S6/Mr Naina/visa_backOffice/src/main/resources/uploads/documents
upload.max.size=10485760
upload.allowed.types=pdf,jpg,jpeg,png,gif

# ============================================================================
# Configuration QR Code et URLs
# ============================================================================

# Configuration Backend API - URL de base pour les appels API backend
# Développement local:
app.base.url=http://localhost:8085
# Pour ngrok (backend port 8085), décommenter et mettre à jour:
# app.base.url=https://XXXX-XXX-XXX-XXX-XX.ngrok-free.app

# Configuration Frontend URL - URL pour les liens QR Code (redirection vers Frontend Vue)
# Développement local (le QR code redirigera vers http://localhost:5173/track/...):
app.frontend.url=http://localhost:5173

# Configuration Frontend NGROK - URL ngrok du frontend pour QR Code sur téléphone
# IMPORTANT: Cette URL doit pointer vers le FRONTEND Vue (port 5173)
# où le endpoint /track/:numeroDemande affiche la page de suivi
# Lancez: ngrok http 5173 --request-header-add "ngrok-skip-browser-warning:69"
app.frontend.ngrok.url=https://3848-129-222-109-131.ngrok-free.app

# Legacy configuration (pour compatibilité)
app.qrcode.base-url=http://localhost:8085

# Sprint 4 - Frontend static files
spring.web.resources.static-locations=classpath:/static/,file:./frontend/
