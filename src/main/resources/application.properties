# Nom de l'application
spring.application.name=Visa

# Local development settings
server.port=8085

# PostgreSQL local
spring.datasource.url=jdbc:postgresql://localhost:5432/visa
spring.datasource.username=postgres
spring.datasource.password=postgres
# spring.datasource.password=nella
# spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate (local)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Configuration de validité du visa transformable
renouvellement.delta.jours=0

# Configuration upload de documents (Sprint 3)
upload.dir=E:/HP/Documents/S6/Mr Naina/visa_backOffice/src/main/resources/uploads/documents
upload.max.size=10485760
upload.allowed.types=pdf,jpg,jpeg,png,gif
